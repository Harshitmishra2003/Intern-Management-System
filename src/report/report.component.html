<div class="p-6 max-w-6xl mx-auto">
  <h2 class="text-2xl font-semibold text-slate-800 mb-6">
    Completed Batch Reports
  </h2>

  <div
    *ngIf="completedBatches.length === 0"
    class="text-slate-500"
  >
    No completed batches available
  </div>

  <div class="grid gap-4">
    <div
      *ngFor="let batch of completedBatches"
      class="bg-white rounded-xl shadow p-5 flex justify-between items-center"
    >
      <div>
        <h3 class="text-lg font-semibold text-slate-800">
          {{ batch.name }}
        </h3>
        <p class="text-sm text-slate-600">
          {{ batch.startDate }} → {{ batch.endDate }}
        </p>
      </div>

      <button
        (click)="downloadReport(batch)"
        class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-500"
      >
        Download Report
      </button>
    </div>
  </div>
</div>
