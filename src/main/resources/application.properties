# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/intern_management?useSSL=false&serverTimezone=UTC
spring.datasource.username=Harshit mishra
spring.datasource.password=Your database code

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JACKSON (JSON)
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false

# ===============================
# FILE DOWNLOAD SETTINGS (Optional)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING (Optional but useful)
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG