<div class="min-h-screen bg-slate-100 flex">

  <!-- ================= MOBILE OVERLAY ================= -->
  <div *ngIf="isSidebarOpen"
       class="fixed inset-0 bg-black bg-opacity-40 z-40 md:hidden"
       (click)="toggleSidebar()">
  </div>


   <!-- ================= SIDEBAR ================= -->
   <aside
   class="fixed md:relative z-50 top-0 bottom-0 left-0 
         w-64 bg-white shadow-lg 
         transform transition-transform duration-300 
         md:translate-x-0 md:h-screen
         h-screen"
   [ngClass]="{
    '-translate-x-full': !isSidebarOpen,
    'translate-x-0': isSidebarOpen
   }">



    <div class="px-6 py-5 text-xl font-bold text-indigo-600 border-b">
      Intern Admin
    </div>

    <nav class="px-4 py-4 space-y-2">

      <a routerLink="/"
         routerLinkActive="bg-indigo-50 text-indigo-600"
         class="block px-4 py-2 rounded-lg hover:bg-slate-100 transition">
        Dashboard
      </a>

      <button (click)="addIntern()"
              class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-100 transition">
        Add Intern
      </button>

      <button (click)="viewInterns()"
              class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-100 transition">
        Intern List
      </button>

      <button (click)="addBatch()"
              class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-100 transition">
        Create Batch
      </button>
      <button (click)="batchList()"
              class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-100 transition">
        Batch List
      </button>

      <button (click)="generateReport()"
              class="w-full text-left px-4 py-2 rounded-lg hover:bg-slate-100 transition">
        Reports
      </button>

    </nav>
  </aside>


  <!-- ================= MAIN CONTENT ================= -->
  <div class="flex-1 flex flex-col">

    <!-- ======= HEADER ======= -->
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">

      <!-- Mobile menu button -->
      <button class="md:hidden text-2xl"
              (click)="toggleSidebar()">
        ☰
      </button>

      <h1 class="text-2xl font-semibold text-slate-700">
        Dashboard
      </h1>

      <button
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition"
        (click)="addBatch()">
        + Add Batch
      </button>

    </header>


    <!-- ======= CONTENT ======= -->
    <main class="p-6 space-y-8">

      <!-- ======= STATS ======= -->
      <section class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">

        <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition flex gap-4 items-center">
          <div class="text-3xl">📦</div>
          <div>
            <p class="text-slate-500">Total Batches</p>
            <b class="text-xl">{{ batches.length }}</b>
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition flex gap-4 items-center">
          <div class="text-3xl">👨‍🎓</div>
          <div>
            <p class="text-slate-500">Active Interns</p>
            <b class="text-xl">12</b>
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition flex gap-4 items-center">
          <div class="text-3xl">✅</div>
          <div>
            <p class="text-slate-500">Completed</p>
            <b class="text-xl">8</b>
          </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow hover:shadow-md transition flex gap-4 items-center">
          <div class="text-3xl">⏳</div>
          <div>
            <p class="text-slate-500">Pending</p>
            <b class="text-xl">4</b>
          </div>
        </div>

      </section>


      <!-- ======= RECENT BATCHES ======= -->
      <section class="bg-white p-6 rounded-xl shadow">

        <h2 class="font-semibold text-lg mb-4 text-slate-700">
          Recent Batches
        </h2>

        <table class="w-full border-collapse">

          <thead>
            <tr class="text-left text-slate-500 border-b">
              <th class="py-2">Batch Name</th>
              <th class="py-2">Start Date</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let batch of batches"
                class="hover:bg-slate-50 cursor-pointer border-b"
                (click)="viewBatch(batch)">
              <td class="py-3">{{ batch.name }}</td>
              <td class="py-3 text-slate-500">{{ batch.startDate }}</td>
            </tr>
          </tbody>

        </table>

      </section>

    </main>

  </div>
</div>
